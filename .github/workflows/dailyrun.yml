name: Daily automation run in github

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run sanity test only
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npx playwright test tests/Joshin/tests/pagecheck.spec.ts --project=chromium-without-auth

      - name: Upload joshin-community screenshot to Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ secrets.SLACK_CHANNEL_ID }}
            initial_comment: "📸 Community Page Screenshot - Run #${{ github.run_number }}"
            file: "test-results/joshin-community-page.png"
            filename: "community-${{ github.run_number }}.png"

      - name: Upload joshin-socialroom screenshot to Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ secrets.SLACK_CHANNEL_ID }}
            initial_comment: "📸 Social Room Screenshot - Run #${{ github.run_number }}"
            file: "test-results/joshin-socialroom-page.png"
            filename: "socialroom-${{ github.run_number }}.png"